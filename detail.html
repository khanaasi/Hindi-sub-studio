<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watch Online | Anime Sub Studio</title>
    <meta name="referrer" content="no-referrer-when-downgrade">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .detail-container { max-width: 800px; margin: 30px auto; padding: 25px; background: var(--card-bg); border-radius: 20px; display: flex; flex-direction: column; align-items: center; text-align: left; }
        .detail-img { width: 280px; border-radius: 15px; margin-bottom: 25px; border: 2px solid var(--primary); }
        .detail-info { width: 100%; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);}
        .info-row { margin-bottom: 15px; font-size: 16px; color: #ddd; }
        .info-row strong { color: var(--primary); margin-right: 8px;}
        .story-box { background: #111; padding: 15px; border-radius: 8px; margin-top: 10px; color: #bbb; font-size: 15px; line-height:1.6;}
        .episodes-box { width: 100%; }
        .episodes-box h3 { color: white; margin-bottom: 20px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .ep-btn { background: rgba(255,69,0,0.1); color: white; padding: 12px; text-align: center; border-radius: 10px; cursor: pointer; border: 1px solid rgba(255,69,0,0.3); font-weight:600; transition:0.3s;}
        .ep-btn:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,69,0,0.4); }
        
        /* Modal Popup Design */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(5px); }
        .modal-box { background: #15151a; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #ff4500; box-shadow: 0 10px 30px rgba(255,69,0,0.3); }
        .modal-box h3 { color: white; margin-bottom: 20px; }
        .modal-btn { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 15px; transition: 0.3s;}
        .btn-free { background: #222; color: #fff; border: 1px solid #444; }
        .btn-free:hover { background: #ff4500; border-color: #ff4500; }
        .btn-prem { background: linear-gradient(135deg, #d4af37, #f3e5ab); color: #000; }
        .btn-prem:hover { transform: scale(1.03); box-shadow: 0 5px 15px rgba(212,175,55,0.4); }
        
        .login-form { display: none; background: #0a0a0c; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333;}
        .login-form input { width: 100%; padding: 10px; margin-bottom: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 5px; outline:none;}
        .login-form button { width: 100%; padding: 10px; background: #d4af37; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor:pointer;}
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Anime Sub <span>Studio</span></a>
    </header>

    <a href="index.html" style="display:inline-block; margin:20px; color:white; background:#222; padding:8px 15px; border-radius:10px; text-decoration:none;"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <div id="detailBox">
        <div class="loader-container" style="text-align:center; margin-top:50px;">
            <div class="loader" style="border: 4px solid #333; border-top: 4px solid #ff4500; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
            <h3 style="color:var(--primary);">Loading Details...</h3>
        </div>
    </div>

    <!-- POPUP MODAL -->
    <div id="epModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Choose Option</h3>
            <button class="modal-btn btn-free" id="btnFree" onclick="openFreeLink()"><i class="fas fa-link"></i> Free User (Solve Shortener)</button>
            <button class="modal-btn btn-prem" onclick="togglePremiumForm()"><i class="fas fa-gem"></i> Premium Direct Link</button>
            
            <div id="premiumForm" class="login-form">
                <input type="email" id="pEmail" placeholder="Premium Email">
                <input type="password" id="pPass" placeholder="Password">
                <button id="pLoginBtn" onclick="loginAndOpenPremium()">Login & Open</button>
            </div>
            
            <button onclick="closeModal()" style="margin-top:10px; background:transparent; color:#aaa; border:none; cursor:pointer; font-size:14px;"><u>Cancel</u></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyAjetcwFJR-5b8h-h5AM2j1O2xSk5srh3M",
            authDomain: "anime-sub-studio.firebaseapp.com",
            projectId: "anime-sub-studio"
        });
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const animeId = urlParams.get('id');

        let currentTargetLink = "";
        let isGlobalPremium = false;

        // Make Unique Device ID
        let myDevice = localStorage.getItem("myDeviceId");
        if(!myDevice) {
            myDevice = "DEV_" + Math.random().toString(36).substr(2, 9);
            localStorage.setItem("myDeviceId", myDevice);
        }

        // Check if already logged in securely
        async function checkAutoPremium() {
            let email = localStorage.getItem("premiumUserEmail");
            let pass = localStorage.getItem("premiumUserPass");
            if(email && pass) {
                const snap = await getDoc(doc(db, "premium_users", email));
                if(snap.exists() && snap.data().password === pass) {
                    if(Date.now() < snap.data().expiresAt && snap.data().deviceId === myDevice) {
                        isGlobalPremium = true;
                    }
                }
            }
        }

        // Handle Click on Episode Button
        window.processEpisodeClick = function(secureData) {
            currentTargetLink = atob(secureData); // Decode Link
            
            if(isGlobalPremium) {
                // Agar user pehle se login hai, direct video kholo
                window.open(currentTargetLink, '_blank');
            } else {
                // Varna Popup Dikhao
                document.getElementById('epModal').style.display = 'flex';
                document.getElementById('premiumForm').style.display = 'none';
            }
        };

        window.closeModal = () => document.getElementById('epModal').style.display = 'none';
        window.togglePremiumForm = () => document.getElementById('premiumForm').style.display = 'block';

        // FREE USER: API LINK GENERATE LOGIC
        window.openFreeLink = async function() {
            const btnFree = document.getElementById("btnFree");
            btnFree.innerHTML = "Generating Link...";
            
            try {
                const settingsSnap = await getDoc(doc(db, "settings", "general"));
                const shorteners = settingsSnap.exists() ? (settingsSnap.data().shorteners || []) :[];

                if (shorteners.length === 0) {
                    // Agar admin ne shortener lagaya hi nahi hai
                    window.open(currentTargetLink, '_blank');
                    closeModal();
                } else {
                    // Pick 1 API randomly
                    const apiObj = shorteners[Math.floor(Math.random() * shorteners.length)];
                    const apiUrl = `${apiObj.url}?api=${apiObj.key}&url=${encodeURIComponent(currentTargetLink)}&format=text`;

                    // Using JSON proxy to avoid CORS and get clean string
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;
                    const response = await fetch(proxyUrl);
                    const data = await response.json();
                    
                    const shortLink = data.contents.trim();

                    if (shortLink && shortLink.startsWith("http")) {
                        window.open(shortLink, '_blank');
                        closeModal();
                    } else {
                        alert("Shortener API Error! Please try another API.");
                    }
                }
            } catch (error) { 
                alert("Server Connection Failed!"); 
            } finally {
                btnFree.innerHTML = '<i class="fas fa-link"></i> Free User (Solve Shortener)';
            }
        };

        // PREMIUM USER: LOGIN & DIRECT LINK
        window.loginAndOpenPremium = async function() {
            const email = document.getElementById("pEmail").value.trim().toLowerCase();
            const pass = document.getElementById("pPass").value.trim();
            const pBtn = document.getElementById("pLoginBtn");

            if(!email || !pass) return alert("Enter Email and Password!");
            
            pBtn.innerText = "Checking...";
            
            try {
                const snap = await getDoc(doc(db, "premium_users", email));
                if(snap.exists() && snap.data().password === pass) {
                    const data = snap.data();
                    
                    // Check Expiry (28 Days)
                    if(Date.now() > data.expiresAt) {
                        alert("❌ Premium Plan has Expired!");
                        pBtn.innerText = "Login & Open";
                        return;
                    }
                    
                    // Device Locking Logic
                    if(data.deviceId && data.deviceId !== myDevice) {
                        alert("❌ Account is already locked to another user's device! Sharing is not allowed.");
                        pBtn.innerText = "Login & Open";
                        return;
                    }
                    
                    // First time login - bind device
                    if(!data.deviceId) {
                        await updateDoc(doc(db, "premium_users", email), { deviceId: myDevice });
                    }
                    
                    // Success! Save session and open link
                    localStorage.setItem("premiumUserEmail", email);
                    localStorage.setItem("premiumUserPass", pass);
                    isGlobalPremium = true;
                    
                    alert("💎 Premium Login Success! Opening Direct Link...");
                    window.open(currentTargetLink, '_blank');
                    closeModal();
                } else {
                    alert("❌ Invalid Details! Contact Admin.");
                }
            } catch(e) { alert("Server Error."); }
            pBtn.innerText = "Login & Open";
        };

        // RENDER DETAILS PAGE
        async function loadDetail() {
            await checkAutoPremium();
            if (!animeId) return document.getElementById("detailBox").innerHTML = "<h2 style='text-align:center;'>ID Missing!</h2>";
            
            const docSnap = await getDoc(doc(db, "anime", animeId));
            if (docSnap.exists()) {
                const a = docSnap.data();
                const episodes = a.episodes ||[];
                
                let episodesHTML = "";
                if(episodes.length === 0) {
                    episodesHTML = "<p style='color:#aaa; text-align:center; width:100%;'>No episodes uploaded yet.</p>";
                } else {
                    episodes.forEach((ep) => {
                        const secureCode = btoa(ep.link);
                        episodesHTML += `<button class="ep-btn" onclick="processEpisodeClick('${secureCode}')">Episode ${ep.ep}</button>`;
                    });
                }

                document.getElementById("detailBox").innerHTML = `
                    <div class="detail-container">
                        <img src="${a.image}" class="detail-img">
                        <div class="detail-info">
                            <div class="info-row"><strong>Name :</strong> ${a.name}</div>
                            <div class="info-row"><strong>Released date :</strong> ${a.year || "Unknown"}</div>
                            <div class="info-row"><strong>Genre :</strong> ${a.genre || "General"}</div>
                            <div class="info-row"><strong>Story :</strong> <div class="story-box">${a.description || "Story not available."}</div></div>
                        </div>
                        <div class="episodes-box">
                            <h3>Episodes</h3>
                            <div class="episodes-grid">${episodesHTML}</div>
                        </div>
                    </div>
                `;
            } else {
                document.getElementById("detailBox").innerHTML = "<h2 style='text-align:center;'>Content Not Found!</h2>";
            }
        }

        loadDetail();
    </script>
</body>
</html>
