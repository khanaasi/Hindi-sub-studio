<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Google Site Verification Tag -->
    <meta name="google-site-verification" content="sRIelaHoOeqzs5kOmIGkEXaFdD3QZOHHylaUa1TIP5c" />
    
    <title>Anime Sub Studio - Hindi Sub & Dub Anime</title>
    <meta name="description" content="Watch Anime, K-Dramas, Cartoons, and Movies in Hindi Sub & Dub for free.">
    <meta name="keywords" content="Hindi sub anime, Hindi dub anime, Anime sub studio, K drama hindi sub, K drama Hindi dub, movies, cartoon">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Sidebar aur Tree Dots ke liye Special CSS -->
    <style>
        /* Sidebar (Tree Dots Menu) ko chhipane (hide) aur design karne ka code */
        .sidebar {
            height: 100%;
            width: 0; /* Default width 0, matlab hide rahega */
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            background-color: #111; /* Dark background */
            overflow-x: hidden;
            transition: 0.4s; /* Smooth open animation */
            padding-top: 60px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .sidebar-content { padding: 0 20px 30px 20px; }
        .sidebar .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 35px;
            color: #fff;
            text-decoration: none;
            transition: 0.3s;
        }
        .sidebar .close-btn:hover { color: #ff4500; }
        
        /* Overlay (Black shadow jab menu open ho) */
        #overlay {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-color: rgba(0,0,0,0.7);
            z-index: 1500;
            cursor: pointer;
        }

        /* Options Design */
        .sidebar-heading { color: #ff4500; font-size: 16px; margin: 25px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; font-weight: bold;}
        .sidebar-btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .sidebar-item { background: #222; color: white; border: 1px solid #444; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .sidebar-item:hover, .sidebar-item.active { background: #ff4500; border-color: #ff4500; }
        .reset-btn { width: 100%; background: #ff4500; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 15px;}
    </style>
</head>
<body>

    <!-- SIDEBAR (Tree Dots Menu Jo Andar Chhipa Rahega) -->
    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="closeNav()">&times;</a>
        <div class="sidebar-content">
            
            <button onclick="resetAllFilters()" class="reset-btn"><i class="fas fa-home"></i> Home (Show All)</button>

            <!-- 1. Category Section -->
            <h3 class="sidebar-heading"><i class="fas fa-list"></i> Category</h3>
            <div id="sidebar-categories" class="sidebar-btn-group"></div>

            <!-- 2. Genre Section -->
            <h3 class="sidebar-heading"><i class="fas fa-tags"></i> Genre</h3>
            <div id="sidebar-genres" class="sidebar-btn-group"></div>

            <!-- 3. A-Z & 0-9 Section -->
            <h3 class="sidebar-heading"><i class="fas fa-font"></i> A-Z Directory</h3>
            <div id="az-alphabet-box" class="sidebar-btn-group"></div>
            
        </div>
    </div>
    <!-- Overlay -->
    <div id="overlay" onclick="closeNav()"></div>

    <!-- HEADER (Navigation Bar) -->
    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="openNav()" style="font-size:24px; cursor:pointer; color:white;"><i class="fas fa-bars"></i></span>
            <a href="index.html" class="logo" style="margin-left:15px;">Anime Sub <span>Studio</span></a>
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input id="searchInput" placeholder="Search Anime, K-Drama...">
        </div>
    </header>

    <!-- Main Anime List Container -->
    <main id="animeList" class="anime-list" style="margin-top: 30px;">
        <div class="loader-container">
            <div class="loader" style="border: 4px solid #333; border-top: 4px solid #ff4500; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
            <h3 style="color:#ff4500;">Loading...</h3>
        </div>
    </main>

    <div class="social-footer">
        <a href="https://t.me/hindisubinganime" target="_blank" class="btn-tg"><i class="fab fa-telegram"></i> Free Channel</a>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyAjetcwFJR-5b8h-h5AM2j1O2xSk5srh3M",
            authDomain: "anime-sub-studio.firebaseapp.com",
            projectId: "anime-sub-studio"
        });
        const db = getFirestore(app);

        let allAnime = [];
        let currentCategory = "all";
        let currentGenre = "all";
        let currentLetter = "all";
        let currentSearch = "";

        // Open Sidebar Logic
        window.openNav = () => { 
            document.getElementById("sidebar").style.width = "300px"; 
            document.getElementById("overlay").style.display = "block"; 
            document.body.style.overflow = "hidden"; // background scroll band karne ke liye
        }
        
        // Close Sidebar Logic
        window.closeNav = () => { 
            document.getElementById("sidebar").style.width = "0"; 
            document.getElementById("overlay").style.display = "none"; 
            document.body.style.overflow = "auto";
        }

        async function loadAnime() {
            try {
                const snap = await getDocs(collection(db, "anime"));
                let uniqueCategories = new Set();
                let uniqueGenres = new Set();
                allAnime = [];
                
                snap.forEach(d => {
                    const data = d.data();
                    allAnime.push({ id: d.id, ...data });
                    
                    if(data.type && data.type.trim() !== "") {
                        uniqueCategories.add(data.type.trim());
                    }
                    
                    if(data.genre) {
                        let genresArray = data.genre.split(',');
                        genresArray.forEach(g => {
                            if(g.trim() !== "") uniqueGenres.add(g.trim());
                        });
                    }
                });
                
                allAnime.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
                
                // Add Categories to Sidebar
                const catBox = document.getElementById("sidebar-categories");
                uniqueCategories.forEach(cat => {
                    let btn = document.createElement("button");
                    btn.className = "sidebar-item";
                    btn.innerText = cat;
                    btn.onclick = () => { window.setFilter('category', cat); };
                    catBox.appendChild(btn);
                });

                // Add Genres to Sidebar
                const genreBox = document.getElementById("sidebar-genres");
                uniqueGenres.forEach(genre => {
                    let btn = document.createElement("button");
                    btn.className = "sidebar-item";
                    btn.innerText = genre;
                    btn.onclick = () => { window.setFilter('genre', genre); };
                    genreBox.appendChild(btn);
                });

                // Add A-Z Directory
                const azBox = document.getElementById("az-alphabet-box");
                "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(letter => {
                    let btn = document.createElement("button");
                    btn.className = "sidebar-item";
                    btn.innerText = letter;
                    btn.onclick = () => { window.setFilter('letter', letter); };
                    azBox.appendChild(btn);
                });

                applyFilter();
            } catch (e) {
                console.error(e);
                document.getElementById("animeList").innerHTML = "<h3 style='width:100%;text-align:center;color:red;'>Error Loading Data</h3>";
            }
        }
        
        // Filter logic jab user Tree dots me se kisi button par click karega
        window.setFilter = (filterType, value) => {
            currentCategory = "all";
            currentGenre = "all";
            currentLetter = "all";
            currentSearch = "";
            document.getElementById("searchInput").value = "";

            if(filterType === 'category') currentCategory = value;
            if(filterType === 'genre') currentGenre = value;
            if(filterType === 'letter') currentLetter = value;

            applyFilter();
            closeNav(); // Click karte hi sidebar automatically close ho jayega
        }

        // Home Reset button logic
        window.resetAllFilters = () => {
            currentCategory = "all";
            currentGenre = "all";
            currentLetter = "all";
            currentSearch = "";
            document.getElementById("searchInput").value = "";
            applyFilter();
            closeNav();
        }

        function applyFilter() {
            let filtered = allAnime.filter(a => {
                const nameMatch = (a.name || "").toLowerCase().includes(currentSearch.toLowerCase());
                const catMatch = currentCategory === "all" || (a.type || "").toLowerCase() === currentCategory.toLowerCase();
                
                let genreMatch = true;
                if(currentGenre !== "all") {
                    let postGenres = (a.genre || "").toLowerCase();
                    genreMatch = postGenres.includes(currentGenre.toLowerCase());
                }

                let letterMatch = true;
                if(currentLetter !== "all") {
                    letterMatch = (a.name || "").toUpperCase().startsWith(currentLetter);
                }

                return nameMatch && catMatch && genreMatch && letterMatch;
            });
            render(filtered);
        }

        function render(list) {
            let box = document.getElementById("animeList");
            box.innerHTML = ""; 
            if (list.length === 0) return box.innerHTML = "<h3 style='width:100%;text-align:center;color:#aaa;margin-top:50px;'>No Content Found 😢</h3>";

            list.forEach(a => {
                let card = document.createElement("div");
                card.className = "anime-card";
                card.innerHTML = `
                    <div class="badge-type badge-custom">${a.type || "General"}</div>
                    <img src="${a.image}" loading="lazy">
                    <div class="anime-info">
                        <h4>${a.name}</h4>
                    </div>
                `;
                card.onclick = () => location.href = "detail.html?id=" + a.id;
                box.appendChild(card);
            });
        }

        // Search bar typing logic
        document.getElementById("searchInput").addEventListener("input", e => { 
            currentSearch = e.target.value.trim(); 
            applyFilter(); 
        });

        loadAnime();
    </script>
</body>
</html>
