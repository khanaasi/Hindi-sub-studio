<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Google Site Verification Tag -->
    <meta name="google-site-verification" content="sRIelaHoOeqzs5kOmIGkEXaFdD3QZOHHylaUa1TIP5c" />
    
    <title>Anime Sub Studio - Hindi Sub & Dub Anime</title>
    <meta name="description" content="Watch Anime, K-Dramas, Cartoons, and Movies in Hindi Sub & Dub for free.">
    <meta name="keywords" content="Hindi sub anime, Hindi dub anime, Anime sub studio, K drama hindi sub, K drama Hindi dub, movies, cartoon">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- A-Z & 0-9 DIRECTORY SIDEBAR -->
    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="closeNav()">&times;</a>
        <div class="sidebar-content">
            <h3 style="color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px;"><i class="fas fa-book"></i> Directory</h3>
            <div id="az-alphabet-box" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:15px;"></div>
        </div>
    </div>
    <div id="overlay" onclick="closeNav()"></div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="openNav()" style="font-size:24px; cursor:pointer; color:white;"><i class="fas fa-bars"></i></span>
            <a href="index.html" class="logo" style="margin-left:15px;">Anime Sub <span>Studio</span></a>
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input id="searchInput" placeholder="Search Anime, K-Drama...">
        </div>
    </header>

    <div class="filter-container" id="mainFilters">
        <button onclick="setType('all', this)" class="active">All</button>
    </div>

    <main id="animeList" class="anime-list">
        <div class="loader-container">
            <div class="loader" style="border: 4px solid #333; border-top: 4px solid #ff4500; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
            <h3 style="color:var(--primary);">Loading...</h3>
        </div>
    </main>

    <div class="social-footer">
        <a href="https://t.me/hindisubinganime" target="_blank" class="btn-tg"><i class="fab fa-telegram"></i> Free Channel</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyAjetcwFJR-5b8h-h5AM2j1O2xSk5srh3M",
            authDomain: "anime-sub-studio.firebaseapp.com",
            projectId: "anime-sub-studio"
        });
        const db = getFirestore(app);

        let allAnime =[];
        let currentType = "all";
        let currentSearch = "";

        window.openNav = () => { document.getElementById("sidebar").style.width = "280px"; document.getElementById("overlay").style.display = "block"; }
        window.closeNav = () => { document.getElementById("sidebar").style.width = "0"; document.getElementById("overlay").style.display = "none"; }

        async function loadAnime() {
            try {
                const snap = await getDocs(collection(db, "anime"));
                let uniqueTypes = new Set();
                allAnime =[];
                
                snap.forEach(d => {
                    const data = d.data();
                    allAnime.push({ id: d.id, ...data });
                    if(data.type) uniqueTypes.add(data.type.trim());
                });
                
                allAnime.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
                
                const filterBox = document.getElementById("mainFilters");
                uniqueTypes.forEach(type => {
                    const btn = document.createElement("button");
                    btn.innerText = type;
                    btn.onclick = function() { window.setType(type, this); };
                    filterBox.appendChild(btn);
                });

                // Generate 0-9 and A-Z Buttons
                const azBox = document.getElementById("az-alphabet-box");
                "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(letter => {
                    let btn = document.createElement("button");
                    btn.innerText = letter;
                    btn.style = "background:#222; color:white; border:1px solid #444; padding:8px 12px; border-radius:5px; cursor:pointer; font-weight:bold;";
                    btn.onclick = () => { 
                        window.currentSearch = ""; window.currentType = "all"; 
                        let filtered = allAnime.filter(a => (a.name || "").toUpperCase().startsWith(letter));
                        render(filtered);
                        closeNav(); 
                    };
                    azBox.appendChild(btn);
                });

                applyFilter();
            } catch (e) {
                document.getElementById("animeList").innerHTML = "<h3 style='width:100%;text-align:center;color:red;'>Error Loading Data</h3>";
            }
        }
        
        function applyFilter() {
            let filtered = allAnime.filter(a => {
                const nameMatch = (a.name || "").toLowerCase().includes(currentSearch.toLowerCase());
                const typeMatch = currentType === "all" || (a.type || "").toLowerCase() === currentType.toLowerCase();
                return nameMatch && typeMatch;
            });
            render(filtered);
        }

        function render(list) {
            let box = document.getElementById("animeList");
            box.innerHTML = ""; 
            if (list.length === 0) return box.innerHTML = "<h3 style='width:100%;text-align:center;color:#aaa;'>No Content Found</h3>";

            list.forEach(a => {
                let card = document.createElement("div");
                card.className = "anime-card";
                card.innerHTML = `
                    <div class="badge-type badge-custom">${a.type || "General"}</div>
                    <img src="${a.image}" loading="lazy">
                    <div class="anime-info">
                        <h4>${a.name}</h4>
                    </div>
                `;
                card.onclick = () => location.href = "detail.html?id=" + a.id;
                box.appendChild(card);
            });
        }

        window.setType = (type, btn) => {
            currentType = type;
            document.querySelectorAll(".filter-container button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active"); applyFilter();
        }

        document.getElementById("searchInput").addEventListener("input", e => { currentSearch = e.target.value.trim(); applyFilter(); });
        loadAnime();
    </script>
</body>
</html>
